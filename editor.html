<!DOCTYPE html>

<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; padding: 24px; }
    h1 { font-size: 18px; font-weight: 300; letter-spacing: 0.15em; margin-bottom: 8px; color: #C4A77D; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 32px; }
    .toolbar { display: flex; gap: 12px; margin-bottom: 32px; position: sticky; top: 0; background: #0a0a0a; padding: 12px 0; z-index: 10; border-bottom: 1px solid #222; }
    .btn { padding: 8px 20px; font-size: 12px; letter-spacing: 0.1em; border: 1px solid #333; background: #161616; color: #e0e0e0; cursor: pointer; transition: all 0.2s; }
    .btn:hover { border-color: #C4A77D; color: #C4A77D; }
    .btn--primary { background: #C4A77D; color: #0a0a0a; border-color: #C4A77D; font-weight: 600; }
    .btn--primary:hover { background: #d4b78d; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 16px; }
    .card { display: flex; gap: 16px; padding: 16px; background: #131313; border: 1px solid #1e1e1e; transition: border-color 0.2s; }
    .card:hover { border-color: #333; }
    .card__img { width: 100px; height: 100px; object-fit: cover; flex-shrink: 0; border: 1px solid #222; }
    .card__body { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .card__key { font-size: 11px; color: #666; letter-spacing: 0.1em; }
    .card__select { width: 100%; padding: 6px 8px; font-size: 13px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #2a2a2a; outline: none; }
    .card__select:focus { border-color: #C4A77D; }
    .card__preview { font-size: 11px; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card__play { padding: 4px 12px; font-size: 11px; background: none; border: 1px solid #333; color: #888; cursor: pointer; align-self: flex-start; }
    .card__play:hover { color: #C4A77D; border-color: #C4A77D; }
    .card.is-changed { border-color: #C4A77D; }
    .status { font-size: 12px; color: #4a4; padding: 8px; display: none; }
    .status.is-visible { display: block; }
    audio { display: none; }
    .output { margin-top: 24px; padding: 16px; background: #111; border: 1px solid #222; font-family: monospace; font-size: 11px; color: #aaa; white-space: pre-wrap; max-height: 400px; overflow-y: auto; display: none; }
    .output.is-visible { display: block; }
  </style>
</head>

    // Current mapping (loaded from localStorage or defaults)
    let mapping = {}
    const saved = localStorage.getItem('selin-cover-mapping')
    if (saved) {
      mapping = JSON.parse(saved)
    } else {
      // Default: sequential assignment
      COVERS.forEach((cover, i) => {
        mapping[cover] = SONGS[i % SONGS.length].id
      })
    }

    const player = document.getElementById('player')
    let currentlyPlaying = null

    // Track which songs the user has manually picked (not defaults)
    let userPicked = {}
    const savedPicked = localStorage.getItem('selin-cover-picked')
    if (savedPicked) userPicked = JSON.parse(savedPicked)

    function getUsedSongIds(excludeCover) {
      // Only count songs that were manually picked by the user
      const used = new Set()
      for (const [cover, songId] of Object.entries(mapping)) {
        if (cover !== excludeCover && userPicked[cover] && songId !== 'none') {
          used.add(songId)
        }
      }
      return used
    }

    function render() {
      const grid = document.getElementById('grid')
      grid.innerHTML = COVERS.map(cover => {
        const songId = mapping[cover] || 'none'
        const song = SONGS.find(s => s.id === songId)
        const used = getUsedSongIds(cover)

        const options = SONGS
          .filter(s => s.id === songId || s.id === 'none' || !used.has(s.id))
          .map(s =>
            `<option value="${s.id}" ${s.id === songId ? 'selected' : ''}>${s.title}${s.year ? ' (' + s.year + ')' : ''}</option>`
          ).join('')

        return `
          <div class="card ${userPicked[cover] ? 'is-changed' : ''}" id="card-${cover}">
            <img class="card__img" src="/src/assets/covers/${cover}.jpg" alt="${cover}" />
            <div class="card__body">
              <span class="card__key">${cover}</span>
              <select class="card__select" data-cover="${cover}" onchange="onSelect(this)">
                ${options}
              </select>
              <div style="display:flex;gap:8px;align-items:center;">
                <button class="card__play" onclick="playPreview('${cover}')">&#9654; Dinle</button>
                <span class="card__preview">${song ? song.title : ''}</span>
              </div>
            </div>
          </div>
        `
      }).join('')
    }

    function onSelect(el) {
      const cover = el.dataset.cover
      mapping[cover] = el.value
      userPicked[cover] = true
      localStorage.setItem('selin-cover-mapping', JSON.stringify(mapping))
      localStorage.setItem('selin-cover-picked', JSON.stringify(userPicked))
      // Re-render all to update available options
      render()
    }

    function playPreview(cover) {
      const songId = mapping[cover]
      const song = SONGS.find(s => s.id === songId)
      if (!song || !song.preview) return

      if (currentlyPlaying === cover) {
        player.pause()
        currentlyPlaying = null
        return
      }

      player.src = song.preview
      player.play()
      currentlyPlaying = cover
    }

    function generateCode() {
      let code = 'const COVER_META = {\n'
      COVERS.forEach(cover => {
        const songId = mapping[cover]
        if (!songId || songId === 'none') return
        const song = SONGS.find(s => s.id === songId)
        if (!song) return
        const title = song.title.replace(/'/g, "\\'")
        code += `  '${cover}': { title: '${title}', year: '${song.year}', type: '${song.type}', spotifyId: '${song.id}', preview: '${song.preview}' },\n`
      })
      code += '}'
      return code
    }

    function saveMapping() {
      localStorage.setItem('selin-cover-mapping', JSON.stringify(mapping))
      const code = generateCode()
      const blob = new Blob([code], { type: 'text/plain' })
      const url = URL.createObjectURL(blob)
      const a = document.createElement('a')
      a.href = url
      a.download = 'cover-meta.js'
      a.click()
      URL.revokeObjectURL(url)
      showStatus('Dosya indirildi! Bu kodu card-detail.js\'e yapıştır.')
    }

    function showCode() {
      const output = document.getElementById('output')
      output.textContent = generateCode()
      output.classList.toggle('is-visible')
    }

    function copyCode() {
      navigator.clipboard.writeText(generateCode())
      showStatus('Kod panoya kopyalandı!')
    }

    function showStatus(msg) {
      const el = document.getElementById('status')
      el.textContent = msg
      el.classList.add('is-visible')
      setTimeout(() => el.classList.remove('is-visible'), 3000)
    }

    render()
  </script>
</body>
